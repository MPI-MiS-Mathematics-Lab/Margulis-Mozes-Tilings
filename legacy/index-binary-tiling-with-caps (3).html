<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Binary Tiling with Caps</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    html, body { height: 100%; margin: 0; background: #0d0f12; }
    #app { position: fixed; inset: 0; }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.164.1/build/three.module.js"
    }
  }
  </script>
</head>
<body>
<div id="app"></div>

<script type="module">
import * as THREE from "three";

/* -------------------------
   Renderer / Scene / Camera
------------------------- */
const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputColorSpace = THREE.LinearSRGBColorSpace;
document.getElementById("app").appendChild(renderer.domElement);

const scene  = new THREE.Scene();
const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

/* -------------------------
   Fullscreen Quad
------------------------- */
const quad = new THREE.PlaneGeometry(2, 2);

/* -------------------------
   Shaders
------------------------- */
const vertexShader = /* glsl */`
  varying vec2 vPos;      // clip-space position in [-1,1]^2
  void main() {
    vPos = position.xy;
    gl_Position = vec4(position.xy, 0.0, 1.0);
  }
`;

const fragmentShader = /* glsl */`
#ifdef GL_ES
precision highp float;
#endif

#ifdef GL_OES_standard_derivatives
#extension GL_OES_standard_derivatives : enable
#endif

uniform vec2 uResolution;
varying vec2 vPos;

#define AA 1

// nice 4-color palette
vec3 color4(int id){
    if(id==0) return vec3(0.93,0.40,0.40);
    if(id==1) return vec3(0.42,0.72,0.98);
    if(id==2) return vec3(0.52,0.92,0.56);
    return        vec3(0.95,0.86,0.45);
}

// complex helpers
vec2 cdiv(vec2 a, vec2 b){           // (a.x + i a.y) / (b.x + i b.y)
    float d = dot(b,b);
    return vec2( (a.x*b.x + a.y*b.y)/d, (a.y*b.x - a.x*b.y)/d );
}

void main(){
    vec2 R = uResolution;
    vec3 acc = vec3(0.0);

#if AA>1
    for(int A=0;A<AA;A++) for(int B=0;B<AA;B++){
        vec2 uv = (vPos*0.5 + 0.5) * R + vec2(float(A), float(B))/float(AA);
        vec2 s  = (2.0*uv - R)/R.y;
#else
        vec2 uv = (vPos*0.5 + 0.5) * R;
        vec2 s  = (2.0*uv - R)/R.y;
#endif

        // Poincaré disk coordinates: z = s, unit disk is |s| < 1
        float r2 = dot(s,s);

        vec3 col = vec3(1.0); // background outside disk

        if(r2 < 1.0){
            // Cayley map from disk to upper half-plane:
            // ζ = i * (1 + z) / (1 - z)
            vec2 z   = s;
            vec2 num = vec2(1.0, 0.0) + z;
            vec2 den = vec2(1.0, 0.0) - z;
            vec2 w   = cdiv(num, den);        // w = (1+z)/(1-z)
            vec2 zeta= vec2(-w.y, w.x);       // multiply by i: i*w

            float x = zeta.x;
            float y = zeta.y;                 // y ≥ 0 in UHP

            // --- UHP binary tiling with caps ---
            float eps = max(1e-12, fwidth(y));
            int   n   = int(floor(log2(max(y, eps)))); // band index
            float K   = exp2(float(-n));               // renormalization constant

            // renormalize (base band)
            float xren = K * x;
            float yren = K * y;

            float cell = floor(xren); // cell index

            // reduced position in base tile P
            float xmod = xren - cell;
            float ymod = yren;

            // check if below one of the lower caps
            const float c0  = 0.25;
            const float c1  = 0.75;
            const float rb2 = 1.0 + 0.25*0.25;

            bool underCap =
                ((xmod - c0)*(xmod - c0) + ymod*ymod < rb2) ||
                ((xmod - c1)*(xmod - c1) + ymod*ymod < rb2);

            if(underCap){
                n    -= 1;
                xren *= 2.0;
                yren *= 2.0;
                cell  = floor(xren);
            }

            // parities
            int pN = (n & 1);
            int pJ = int(mod(cell, 2.0));

            int id = (pN<<1) | pJ;
            col = color4(id);

            // aesthetic fade as y->0 boundary in UHP
            float fade = smoothstep(0.0, 3.0*eps, y);
            col = mix(vec3(1.0), col, fade);

            // soft edge at the disk boundary (|z| = 1)
            float dr = 1.0 - sqrt(r2);
            float px = fwidth(s.x) + fwidth(s.y);
            float edge = smoothstep(0.0, 2.0*px, dr);
            col = mix(vec3(1.0), col, edge);
        }

        acc += col;

#if AA>1
    }
    acc /= float(AA*AA);
#endif

    gl_FragColor = vec4(acc,1.0);
}
`;

/* -------------------------
   Material / Mesh
------------------------- */
const material = new THREE.ShaderMaterial({
  vertexShader,
  fragmentShader,
  uniforms: {
    uResolution: { value: new THREE.Vector2(1, 1) }
  }
});
const mesh = new THREE.Mesh(quad, material);
scene.add(mesh);

/* -------------------------
   Keep uResolution in sync
------------------------- */
function updateResolution() {
  const db = new THREE.Vector2();
  renderer.getDrawingBufferSize(db);              // actual framebuffer size
  material.uniforms.uResolution.value.copy(db);
}

/* -------------------------
   Resize & Render
------------------------- */
function onResize() {
  renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  updateResolution();
}
window.addEventListener("resize", onResize);

updateResolution();

renderer.setAnimationLoop(() => {
  // handle live DPR changes (moving between monitors, zoom, etc.)
  updateResolution();
  renderer.render(scene, camera);
});
</script>
</body>
</html>
