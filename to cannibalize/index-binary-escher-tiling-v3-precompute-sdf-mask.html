function parseSingleFloat(name) {
  const match = EXPORTED_TILE_GLSL.match(new RegExp(`const float ${name} = ([^;]+);`));
  if (!match) throw new Error(`Missing ${name}`);
  return Number(match[1]);
}

function parseVec2(name) {
  const match = EXPORTED_TILE_GLSL.match(new RegExp(`const vec2 ${name} = vec2\\(([^,]+), ([^)]+)\\);`));
  if (!match) throw new Error(`Missing ${name}`);
  return [Number(match[1]), Number(match[2])];
}

function parseExportedTileCurves() {
  const curvePattern = /if \(i == \d+\) \{ p0 = vec2\(([^,]+), ([^)]+)\); p1 = vec2\(([^,]+), ([^)]+)\); p2 = vec2\(([^,]+), ([^)]+)\); p3 = vec2\(([^,]+), ([^)]+)\); return; \}/g;
  const curves = [];
  let match;
  while ((match = curvePattern.exec(EXPORTED_TILE_GLSL)) !== null) {
    curves.push([
      [Number(match[1]), Number(match[2])],
      [Number(match[3]), Number(match[4])],
      [Number(match[5]), Number(match[6])],
      [Number(match[7]), Number(match[8])]
    ]);
  }
  if (curves.length === 0) throw new Error("Failed to parse exported tile curves");
  return curves;
}

const TILE_DATA = {
  height: parseSingleFloat("EXPORTED_TILE_HEIGHT"),
  slant: parseSingleFloat("EXPORTED_TILE_SLANT"),
  boundsMin: parseVec2("EXPORTED_TILE_BOUNDS_MIN"),
  boundsMax: parseVec2("EXPORTED_TILE_BOUNDS_MAX"),
  curves: parseExportedTileCurves()
};

function cubicBezierPoint2D(p0, p1, p2, p3, t) {
  const u = 1 - t;
  const b0 = u * u * u;
  const b1 = 3 * u * u * t;
  const b2 = 3 * u * t * t;
  const b3 = t * t * t;
  return [
    b0 * p0[0] + b1 * p1[0] + b2 * p2[0] + b3 * p3[0],
    b0 * p0[1] + b1 * p1[1] + b2 * p2[1] + b3 * p3[1]
  ];
}

function buildTileSegments(curves, steps = 32) {
  const segments = [];
  for (const [p0, p1, p2, p3] of curves) {
    let prev = cubicBezierPoint2D(p0, p1, p2, p3, 0);
    for (let step = 1; step <= steps; step++) {
      const t = step / steps;
      const cur = cubicBezierPoint2D(p0, p1, p2, p3, t);
      segments.push([prev, cur]);
      prev = cur;
    }
  }
  return segments;
}

function rayCrossesSegment(point, a, b) {
  const ay = a[1] > point[1];
  const by = b[1] > point[1];
  if (ay === by) return false;
  const xHit = a[0] + ((point[1] - a[1]) * (b[0] - a[0])) / (b[1] - a[1]);
  return xHit > point[0];
}

function pointInPolyline(point, segments) {
  let hits = 0;
  for (const [a, b] of segments) {
    if (rayCrossesSegment(point, a, b)) hits += 1;
  }
  return (hits & 1) === 1;
}

function pointSegmentDistance(point, a, b) {
  const abx = b[0] - a[0];
  const aby = b[1] - a[1];
  const apx = point[0] - a[0];
  const apy = point[1] - a[1];
  const denom = Math.max(abx * abx + aby * aby, 1e-12);
  const t = Math.max(0, Math.min(1, (apx * abx + apy * aby) / denom));
  const dx = apx - abx * t;
  const dy = apy - aby * t;
  return Math.hypot(dx, dy);
}

function buildTileSdfTexture(tileData, size = 256) {
  const [minX, minY] = tileData.boundsMin;
  const [maxX, maxY] = tileData.boundsMax;
  const width = size;
  const height = size;
  const segments = buildTileSegments(tileData.curves, 32);
  const range = 6 / size * Math.max(maxX - minX, maxY - minY);
  const data = new Uint8Array(width * height * 4);

  for (let y = 0; y < height; y++) {
    for (let x = 0; x < width; x++) {
      const px = minX + ((x + 0.5) / width) * (maxX - minX);
      const py = minY + ((y + 0.5) / height) * (maxY - minY);
      const point = [px, py];
      const inside = pointInPolyline(point, segments);
      let best = Infinity;
      for (const [a, b] of segments) {
        best = Math.min(best, pointSegmentDistance(point, a, b));
      }
      const signed = inside ? best : -best;
      const normalized = Math.max(0, Math.min(1, 0.5 + 0.5 * signed / range));
      const value = Math.round(normalized * 255);
      const idx = 4 * (y * width + x);
      data[idx] = value;
      data[idx + 1] = value;
      data[idx + 2] = value;
      data[idx + 3] = 255;
    }
  }

  const texture = new THREE.DataTexture(data, width, height, THREE.RGBAFormat, THREE.UnsignedByteType);
  texture.colorSpace = THREE.NoColorSpace;
  texture.wrapS = THREE.ClampToEdgeWrapping;
  texture.wrapT = THREE.ClampToEdgeWrapping;
  texture.magFilter = THREE.LinearFilter;
  texture.minFilter = THREE.LinearFilter;
  texture.generateMipmaps = false;
  texture.needsUpdate = true;

  return { texture, range, size: [width, height] };
}

const bakedTileSdf = buildTileSdfTexture(TILE_DATA, 256);

const vertexShader = /* glsl */`
  void main() {
    gl_Position = vec4(position.xy, 0.0, 1.0);
  }
`;

const fragmentShader = /* glsl */`
#ifdef GL_ES
precision highp float;
#endif

#ifdef GL_OES_standard_derivatives
#extension GL_OES_standard_derivatives : enable
#endif

uniform vec2 uResolution;
uniform sampler2D uTileSdf;
uniform vec2 uTileBoundsMin;
uniform vec2 uTileBoundsMax;
uniform vec2 uTileSdfSize;
uniform float uTileSdfRange;

${EXPORTED_TILE_GLSL}

vec3 color3(int id) {
  if (id == 0) return vec3(0.93, 0.40, 0.40);
  if (id == 1) return vec3(0.42, 0.72, 0.98);
  return vec3(0.52, 0.92, 0.56);
}

float modPos(float x, float m) {
  return mod(mod(x, m) + m, m);
}

vec2 cdiv(vec2 a, vec2 b) {
  float d = max(dot(b, b), 1e-8);
  return vec2((a.x * b.x + a.y * b.y) / d, (a.y * b.x - a.x * b.y) / d);
}

vec2 tileUv(vec2 pLocal) {
  return (pLocal - uTileBoundsMin) / (uTileBoundsMax - uTileBoundsMin);
}

float sampleTileSdf(vec2 pLocal) {
  vec2 uv = tileUv(pLocal);
  return (texture2D(uTileSdf, uv).r * 2.0 - 1.0) * uTileSdfRange;
}

float sdfPixelSpan(vec2 pLocal) {
  vec2 uv = tileUv(pLocal);
  vec2 duv = fwidth(uv) * uTileSdfSize;
  return max(max(duv.x, duv.y), 1.0) / max(uTileSdfSize.x, uTileSdfSize.y) * uTileSdfRange;
}

int binaryTileId(float nBand, float j) {
  int pN = int(modPos(nBand, 2.0));
  int pJ = int(modPos(j, 3.0));
  return (pN * pJ + (1 - pN) * (2 - pJ)) % 3;
}

bool bandCouldContain(float yRen) {
  return yRen >= EXPORTED_TILE_BOUNDS_MIN.y && yRen <= EXPORTED_TILE_BOUNDS_MAX.y;
}

bool localCouldContain(vec2 pLocal) {
  return pLocal.x >= uTileBoundsMin.x &&
         pLocal.x <= uTileBoundsMax.x &&
         pLocal.y >= uTileBoundsMin.y &&
         pLocal.y <= uTileBoundsMax.y;
}

float bandPhase(float nBand) {
  return 2.0 * EXPORTED_TILE_SLANT * (exp2(-nBand) - 1.0);
}

void render(out vec4 O, in vec2 U) {
  vec2 R = uResolution.xy;
  vec2 s = (2.0 * U - R) / R.y;
  float r2 = dot(s, s);

  vec3 col = vec3(1.0);

  if (r2 < 1.0) {
    vec2 z = s;
    vec2 num = vec2(1.0, 0.0) + z;
    vec2 den = vec2(1.0, 0.0) - z;
    vec2 w = cdiv(num, den);
    vec2 zeta = vec2(-w.y, w.x);

    float x = zeta.x;
    float y = zeta.y;
    float eps = max(1e-12, fwidth(y));
    float nBase = floor(log2(max(y, eps)));
    float edgeSoftness = max(fwidth(s.x) + fwidth(s.y), 1e-4);

    float chosenN = nBase;
    float chosenJ = 0.0;
    float bestScore = -1.0;

    for (int pass = 0; pass < 3; pass++) {
      float dn = 0.0;
      if (pass == 0) dn = -1.0;
      if (pass == 1) dn = 0.0;
      if (pass == 2) dn = 1.0;

      float nBand = nBase + dn;
      float scale = exp2(nBand);
      float xRen = x / scale - bandPhase(nBand);
      float yLocal = EXPORTED_TILE_HEIGHT * (y / scale - 1.0);
      if (!bandCouldContain(yLocal)) continue;

      float jBase = floor(xRen);
      for (int order = 0; order < 5; order++) {
        float dj = 0.0;
        if (order == 1) dj = -1.0;
        if (order == 2) dj = 1.0;
        if (order == 3) dj = -2.0;
        if (order == 4) dj = 2.0;
        float j = jBase + dj;
        vec2 pLocal = vec2(xRen - j, yLocal);
        if (!localCouldContain(pLocal)) continue;
        float sdf = sampleTileSdf(pLocal);
        float span = sdfPixelSpan(pLocal);
        if (sdf > -span) {
          float score = sdf;
          if (score > bestScore) {
            bestScore = score;
            chosenN = nBand;
            chosenJ = j;
            if (score > span + edgeSoftness) break;
          }
        }
      }
    }

    if (bestScore >= 0.0) {
      int id = binaryTileId(chosenN, chosenJ);
      col = color3(id);
    } else {
      float scale = exp2(nBase);
      float j = floor(x / scale - bandPhase(nBase));
      col = color3(binaryTileId(nBase, j));
    }

    float fade = smoothstep(0.0, 3.0 * eps, y);
    col = mix(vec3(1.0), col, fade);

    float dr = 1.0 - sqrt(r2);
    float px = fwidth(s.x) + fwidth(s.y);
    float diskEdge = smoothstep(0.0, 2.0 * px, dr);
    col = mix(vec3(1.0), col, diskEdge);
  }

  O = vec4(col, 1.0);
}

void main() {
  vec4 outColor;
  render(outColor, gl_FragCoord.xy);
  gl_FragColor = outColor;
}
`;

const material = new THREE.ShaderMaterial({
  vertexShader,
  fragmentShader,
  uniforms: {
    uResolution: { value: new THREE.Vector2(window.innerWidth * DPR, window.innerHeight * DPR) },
    uTileSdf: { value: bakedTileSdf.texture },
    uTileBoundsMin: { value: new THREE.Vector2(...TILE_DATA.boundsMin) },
    uTileBoundsMax: { value: new THREE.Vector2(...TILE_DATA.boundsMax) },
    uTileSdfSize: { value: new THREE.Vector2(...bakedTileSdf.size) },
    uTileSdfRange: { value: bakedTileSdf.range }
  }
});

scene.add(new THREE.Mesh(quad, material));

function onResize() {
  renderer.setSize(window.innerWidth, window.innerHeight);
  material.uniforms.uResolution.value.set(window.innerWidth * DPR, window.innerHeight * DPR);
}

window.addEventListener("resize", onResize);

renderer.setAnimationLoop(() => {
  renderer.render(scene, camera);
});
