const fragmentShader = /* glsl */`
#ifdef GL_ES
precision highp float;
#endif

#ifdef GL_OES_standard_derivatives
#extension GL_OES_standard_derivatives : enable
#endif

uniform vec2 uResolution;

${EXPORTED_TILE_GLSL}

vec3 color3(int id) {
  if (id == 0) return vec3(0.93, 0.40, 0.40);
  if (id == 1) return vec3(0.42, 0.72, 0.98);
  return vec3(0.52, 0.92, 0.56);
}

float modPos(float x, float m) {
  return mod(mod(x, m) + m, m);
}

vec2 cdiv(vec2 a, vec2 b) {
  float d = dot(b, b);
  return vec2((a.x * b.x + a.y * b.y) / d, (a.y * b.x - a.x * b.y) / d);
}

vec2 cubicBezierPoint(vec2 p0, vec2 p1, vec2 p2, vec2 p3, float t) {
  float u = 1.0 - t;
  float b0 = u * u * u;
  float b1 = 3.0 * u * u * t;
  float b2 = 3.0 * u * t * t;
  float b3 = t * t * t;
  return b0 * p0 + b1 * p1 + b2 * p2 + b3 * p3;
}

bool rayCrossesSegmentToRight(vec2 p, vec2 a, vec2 b) {
  if ((a.y > p.y) == (b.y > p.y)) return false;
  float xHit = a.x + (p.y - a.y) * (b.x - a.x) / (b.y - a.y);
  return xHit > p.x;
}

int cubicRayCrossings(vec2 p, vec2 p0, vec2 p1, vec2 p2, vec2 p3) {
  const int STEPS = 28;
  int hits = 0;
  vec2 prev = cubicBezierPoint(p0, p1, p2, p3, 0.0);
  for (int step = 1; step <= STEPS; step++) {
    float t = float(step) / float(STEPS);
    vec2 cur = cubicBezierPoint(p0, p1, p2, p3, t);
    if (rayCrossesSegmentToRight(p, prev, cur)) {
      hits += 1;
    }
    prev = cur;
  }
  return hits;
}

float cubicDistance(vec2 p, vec2 p0, vec2 p1, vec2 p2, vec2 p3) {
  const int STEPS = 48;
  float best = 1e9;
  vec2 prev = cubicBezierPoint(p0, p1, p2, p3, 0.0);
  best = min(best, distance(p, prev));
  for (int step = 1; step <= STEPS; step++) {
    float t = float(step) / float(STEPS);
    vec2 cur = cubicBezierPoint(p0, p1, p2, p3, t);
    vec2 seg = cur - prev;
    float h = clamp(dot(p - prev, seg) / max(dot(seg, seg), 1e-8), 0.0, 1.0);
    best = min(best, distance(p, prev + h * seg));
    prev = cur;
  }
  return best;
}

float exportedTileParity(vec2 p) {
  vec2 q = clamp(p, EXPORTED_TILE_BOUNDS_MIN + vec2(1e-4), EXPORTED_TILE_BOUNDS_MAX - vec2(1e-4));
  int hits = 0;
  for (int i = 0; i < EXPORTED_TILE_CURVE_COUNT; i++) {
    vec2 p0;
    vec2 p1;
    vec2 p2;
    vec2 p3;
    getExportedTileCurve(i, p0, p1, p2, p3);
    hits += cubicRayCrossings(q, p0, p1, p2, p3);
  }
  return mod(float(hits), 2.0);
}

float exportedTileDistance(vec2 p) {
  float best = 1e9;
  for (int i = 0; i < EXPORTED_TILE_CURVE_COUNT; i++) {
    vec2 p0;
    vec2 p1;
    vec2 p2;
    vec2 p3;
    getExportedTileCurve(i, p0, p1, p2, p3);
    best = min(best, cubicDistance(p, p0, p1, p2, p3));
  }
  return best;
}

int binaryTileId(float nBand, float j) {
  int pN = int(modPos(nBand, 2.0));
  int pJ = int(modPos(j, 3.0));
  return (pN * pJ + (1 - pN) * (2 - pJ)) % 3;
}

bool bandCouldContain(float yRen) {
  return yRen >= EXPORTED_TILE_BOUNDS_MIN.y && yRen <= EXPORTED_TILE_BOUNDS_MAX.y;
}

bool localCouldContain(vec2 pLocal) {
  return pLocal.x >= EXPORTED_TILE_BOUNDS_MIN.x &&
         pLocal.x <= EXPORTED_TILE_BOUNDS_MAX.x &&
         pLocal.y >= EXPORTED_TILE_BOUNDS_MIN.y &&
         pLocal.y <= EXPORTED_TILE_BOUNDS_MAX.y;
}

float bandPhase(float nBand) {
  return 2.0 * EXPORTED_TILE_SLANT * (exp2(-nBand) - 1.0);
}

void render(out vec4 O, in vec2 U) {
  vec2 R = uResolution.xy;
  vec2 s = (2.0 * U - R) / R.y;
  float r2 = dot(s, s);

  vec3 col = vec3(1.0);

  if (r2 < 1.0) {
    vec2 z = s;
    vec2 num = vec2(1.0, 0.0) + z;
    vec2 den = vec2(1.0, 0.0) - z;
    vec2 w = cdiv(num, den);
    vec2 zeta = vec2(-w.y, w.x);

    float x = zeta.x;
    float y = zeta.y;
    float eps = max(1e-12, fwidth(y));
    float nBase = floor(log2(max(y, eps)));

    float chosenN = nBase;
    float chosenJ = 0.0;
    vec2 chosenLocal = vec2(0.0);
    float bestScore = -1.0;

    for (int pass = 0; pass < 3; pass++) {
      float dn = 0.0;
      if (pass == 0) dn = -1.0;
      if (pass == 1) dn = 0.0;
      if (pass == 2) dn = 1.0;

      float nBand = nBase + dn;
      float scale = exp2(nBand);
      float xRen = x / scale - bandPhase(nBand);
      float yLocal = EXPORTED_TILE_HEIGHT * (y / scale - 1.0);
      if (!bandCouldContain(yLocal)) continue;

      float jBase = floor(xRen);
      for (int order = 0; order < 7; order++) {
        float dj = 0.0;
        if (order == 1) dj = -1.0;
        if (order == 2) dj = 1.0;
        if (order == 3) dj = -2.0;
        if (order == 4) dj = 2.0;
        if (order == 5) dj = -3.0;
        if (order == 6) dj = 3.0;
        float j = jBase + dj;
        vec2 pLocal = vec2(xRen - j, yLocal);
        if (!localCouldContain(pLocal)) continue;
        if (exportedTileParity(pLocal) > 0.5) {
          float score = exportedTileDistance(pLocal);
          if (score > bestScore) {
            bestScore = score;
            chosenN = nBand;
            chosenJ = j;
            chosenLocal = pLocal;
          }
        }
      }
    }

    if (bestScore >= 0.0) {
      int id = binaryTileId(chosenN, chosenJ);
      col = color3(id);
    } else {
      float scale = exp2(nBase);
      float j = floor(x / scale - bandPhase(nBase));
      col = color3(binaryTileId(nBase, j));
    }

    float fade = smoothstep(0.0, 3.0 * eps, y);
    col = mix(vec3(1.0), col, fade);

    float dr = 1.0 - sqrt(r2);
    float px = fwidth(s.x) + fwidth(s.y);
    float diskEdge = smoothstep(0.0, 2.0 * px, dr);
    col = mix(vec3(1.0), col, diskEdge);
  }

  O = vec4(col, 1.0);
}

void main() {
  vec4 outColor;
  render(outColor, gl_FragCoord.xy);
  gl_FragColor = outColor;
}
`;

  vertexShader,
  fragmentShader,
  uniforms: {
    uResolution: { value: new THREE.Vector2(window.innerWidth * DPR, window.innerHeight * DPR) }
  }
});

scene.add(new THREE.Mesh(quad, material));

function onResize() {
  renderer.setSize(window.innerWidth, window.innerHeight);
  material.uniforms.uResolution.value.set(window.innerWidth * DPR, window.innerHeight * DPR);
}

window.addEventListener("resize", onResize);

renderer.setAnimationLoop(() => {
  renderer.render(scene, camera);
});
